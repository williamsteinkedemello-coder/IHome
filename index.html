<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>IHome</title>
    <meta name="title" content="IHome" />
    <meta
      name="description"
      content="IHome is a smart home automation system that allows you to control and monitor your home from anywhere. With IHome, you can manage your lights, thermostat, security cameras, and more, all from a single app. Experience the convenience and security of a connected home with IHome."
    />

    <!-- favicon -->
    <link rel="icon" href="./files/assets/icons/favicon.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" />

    <!-- Google Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <img
          id="icon-header"
          src="./files/assets/icons/home-icon.svg"
          width="50px"
          alt="home icon"
        />IHome
      </div>
      <!-- Desktop Navigation -->
      <nav class="nav" id="nav">
        <a href="#">Home</a>
        <a href="#">Rent</a>
        <a href="#">Sell</a>
        <a href="#">Buy</a>
        <a href="#about-section">About</a>
        <a href="#">Contact</a>
      </nav>

      <a href="#" class="login-btn">Login</a>

      <!-- Mobile Navigation -->
      <div class="burger" id="burger">
        <span class="material-icons">menu</span>
      </div>

      <nav class="mobile-nav" id="mobileNav">
        <div class="material-icons close" id="closeBtn">close</div>
        <a href="#">Home</a>
        <a href="#">Rent</a>
        <a href="#">Sell</a>
        <a href="#">Buy</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#" class="mobile-login">Login</a>
      </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <h1>Smarter living starts here.</h1>
        <p class="hero-subtitle">
          Control your home effortlessly with intelligent automation.
        </p>

        <button class="hero-btn" id="learnMoreBtn">Learn More</button>
      </div>
    </section>

    <!-- About Section -->
    <section class="about-section" id="about-section">
      <div class="section-content">
        <div class="about-image-wrapper">
          <img class="about-image" src="/files/assets/images/hero.png" alt="">
        </div>
        <div class="about-details"></div>

        </div>
      </div>
    </section>

    <!-- Custom JS -->
    <script src="script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Additional sections for features, about, contact, etc. can be added here -->
  </body>
</html>
